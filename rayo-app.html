<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayo · Plataforma</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600;700&display=swap');
  :root{
    --ink:#15130f;--ink-soft:#5c574d;--paper:#f4f0e8;--paper-2:#ece6da;
    --card:#fffdf8;--rule:#ddd6c8;--accent:#c9442b;--accent-d:#a8351f;--accent-soft:#f5ddd5;
    --green:#1f6b4a;--green-soft:#d8ebe1;--amber:#9a6a14;--amber-soft:#f3e6c8;
    --blue:#2b5c8a;--blue-soft:#d9e6f2;
    --shadow:0 1px 2px rgba(20,16,8,.04),0 8px 22px rgba(20,16,8,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Spline Sans',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:14px}
  .hidden{display:none !important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(circle at 30% 20%,#f7ece2,transparent 60%),radial-gradient(circle at 80% 80%,#efe6d6,transparent 55%),var(--paper)}
  .login-card{background:var(--card);border:1px solid var(--rule);border-radius:20px;box-shadow:var(--shadow);padding:48px 44px;max-width:430px;width:100%}
  .login-card .brand{font-family:'Fraunces',serif;font-weight:600;font-size:42px;letter-spacing:-.03em;display:flex;align-items:baseline;gap:9px;margin-bottom:4px}
  .login-card .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--accent)}
  .login-card .tag{color:var(--ink-soft);font-size:14px;margin-bottom:30px}
  .login-card label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-soft);font-weight:600;margin:14px 0 6px}
  .login-card input{width:100%;padding:12px 14px;border:1px solid var(--rule);border-radius:10px;background:var(--paper)}
  .role-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
  .role-pick button{padding:16px 12px;border:1.5px solid var(--rule);border-radius:12px;background:var(--paper);text-align:left;transition:all .15s}
  .role-pick button:hover{border-color:var(--accent)}
  .role-pick button.sel{border-color:var(--accent);background:var(--accent-soft)}
  .role-pick .rt{font-weight:600;font-size:15px;margin-bottom:2px}
  .role-pick .rd{font-size:12px;color:var(--ink-soft)}
  .btn-primary{width:100%;margin-top:26px;background:var(--accent);color:#fff;padding:13px;border-radius:10px;font-weight:600;font-size:15px;transition:background .15s}
  .btn-primary:hover{background:var(--accent-d)}
  .login-hint{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:18px}

  /* ---------- APP SHELL ---------- */
  #app{display:flex;min-height:100vh}
  aside{width:250px;flex-shrink:0;background:var(--paper-2);border-right:1px solid var(--rule);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side-top{padding:22px 22px 14px}
  .side-brand{font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.02em;display:flex;align-items:baseline;gap:7px}
  .side-brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .side-role{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:5px;padding:3px 9px;border-radius:100px;display:inline-block}
  .side-role.admin{background:var(--accent-soft);color:var(--accent-d)}
  .side-role.client{background:var(--blue-soft);color:var(--blue)}
  nav.menu{flex:1;overflow-y:auto;padding:8px 12px}
  nav.menu button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 13px;border-radius:9px;color:var(--ink-soft);font-size:14px;font-weight:500;margin-bottom:2px;transition:all .13s}
  nav.menu button:hover{background:var(--card);color:var(--ink)}
  nav.menu button.active{background:var(--ink);color:#fff}
  nav.menu button .ic{width:17px;height:17px;flex-shrink:0;opacity:.8}
  nav.menu button.active .ic{opacity:1}
  .side-bottom{padding:14px;border-top:1px solid var(--rule)}
  .side-bottom .who{font-size:12.5px;color:var(--ink-soft);padding:0 8px 10px}
  .side-bottom .who b{color:var(--ink);font-weight:600}
  .btn-out{width:100%;padding:9px;border-radius:9px;border:1px solid var(--rule);color:var(--ink-soft);font-size:13px;font-weight:500;background:var(--card)}
  .btn-out:hover{border-color:var(--accent);color:var(--accent)}

  main{flex:1;padding:34px 44px 80px;max-width:1100px;overflow-x:hidden}
  .page-head{margin-bottom:24px}
  .page-head h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.02em}
  .page-head p{color:var(--ink-soft);font-size:14.5px;margin-top:3px}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;margin-bottom:26px}
  .metric{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .metric .ml{font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-bottom:7px}
  .metric .mv{font-family:'Fraunces',serif;font-size:32px;font-weight:600;line-height:1}
  .metric .mv small{font-size:14px;color:var(--ink-soft);font-weight:500}
  .metric.accent .mv{color:var(--accent)}

  /* cards / tables */
  .card{background:var(--card);border:1px solid var(--rule);border-radius:14px;box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
  .card-h{padding:16px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .card-h h3{font-size:16px;font-weight:600}
  .card-h .sub{font-size:13px;color:var(--ink-soft)}
  .card-body{padding:20px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:11px 20px;background:var(--paper-2);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;border-bottom:1px solid var(--rule)}
  td{padding:12px 20px;border-bottom:1px solid var(--rule)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--paper)}
  .empty{padding:34px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px}

  /* status chips */
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;letter-spacing:.02em;white-space:nowrap}
  .chip.gray{background:var(--paper-2);color:var(--ink-soft)}
  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .chip.amber{background:var(--amber-soft);color:var(--amber)}
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.red{background:var(--accent-soft);color:var(--accent-d)}

  /* buttons inline */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;font-size:13.5px;font-weight:600;transition:all .14s;border:1px solid transparent}
  .btn.pri{background:var(--accent);color:#fff}
  .btn.pri:hover{background:var(--accent-d)}
  .btn.ghost{background:var(--paper);border-color:var(--rule);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* forms */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600;margin-bottom:5px}
  .field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--rule);border-radius:9px;background:var(--paper)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;align-items:end}

  /* integration tiles */
  .integ{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .itile{border:1px solid var(--rule);border-radius:12px;padding:18px;background:var(--paper)}
  .itile .in{font-weight:600;font-size:15px;margin-bottom:4px}
  .itile .ist{font-size:12.5px;color:var(--ink-soft);margin-bottom:13px}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,16,8,.45);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;backdrop-filter:blur(2px)}
  .modal{background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:540px;width:100%;max-height:88vh;overflow-y:auto}
  .modal-h{padding:20px 24px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between}
  .modal-h h3{font-family:'Fraunces',serif;font-size:21px;font-weight:600}
  .modal-h .x{font-size:24px;color:var(--ink-soft);line-height:1;width:30px;height:30px;border-radius:8px}
  .modal-h .x:hover{background:var(--paper-2)}
  .modal-body{padding:24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:10px}

  /* scan sim */
  .scanbox{background:#15130f;border-radius:14px;padding:24px;color:#f4f0e8;text-align:center;margin:8px 0 16px}
  .scanbox .laser{height:2px;background:var(--accent);margin:14px auto;width:78%;border-radius:2px;box-shadow:0 0 12px var(--accent);animation:scan 1.4s ease-in-out infinite}
  @keyframes scan{0%,100%{opacity:.3;transform:scaleX(.6)}50%{opacity:1;transform:scaleX(1)}}
  .scanbox .sku{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:.04em}
  .scanbox .sdesc{font-size:13px;opacity:.7;margin-top:3px}
  .scan-progress{font-size:13px;color:var(--ink-soft);margin-bottom:8px;font-weight:600}

  .pick-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--rule);border-radius:11px;margin-bottom:10px;background:var(--paper)}
  .pick-item.done{background:var(--green-soft);border-color:#bcd9cb}
  .pick-item .pos{font-family:'Fraunces',serif;font-weight:600;background:var(--ink);color:#fff;padding:6px 11px;border-radius:8px;font-size:13px;min-width:62px;text-align:center}
  .pick-item.done .pos{background:var(--green)}
  .pick-item .pname{flex:1}
  .pick-item .pname b{font-weight:600}
  .pick-item .pname small{display:block;color:var(--ink-soft);font-size:12px}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--rule);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .pick-item.done .check{background:var(--green);border-color:var(--green);color:#fff}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:80;opacity:0;transition:all .3s;display:flex;align-items:center;gap:9px}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast .dot{width:8px;height:8px;border-radius:50%;background:#5fd39a}

  .flow-banner{background:var(--blue-soft);border:1px solid #bcd0e2;border-radius:12px;padding:14px 18px;font-size:13.5px;color:var(--blue);margin-bottom:20px;display:flex;gap:10px;align-items:flex-start}

  .hint-row{font-size:12.5px;color:var(--ink-soft);margin-top:10px}
  @media(max-width:820px){
    aside{width:62px}.side-brand,.side-role,.side-bottom .who,nav.menu button span{display:none}
    nav.menu button{justify-content:center;padding:12px}
    main{padding:24px 18px 60px}.grid2,.grid3{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brand">Rayo<span class="dot"></span></div>
    <div class="tag">Plataforma de fulfillment · Bogotá</div>

    <label>Tipo de acceso</label>
    <div class="role-pick">
      <button id="pickAdmin" onclick="pickRole('admin')">
        <div class="rt">Admin Rayo</div>
        <div class="rd">Operación interna</div>
      </button>
      <button id="pickClient" onclick="pickRole('client')">
        <div class="rt">Cliente</div>
        <div class="rd">Marca / Portal</div>
      </button>
    </div>

    <label>Email</label>
    <input id="email" type="email" placeholder="tu@correo.com" value="">
    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" value="demo">

    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-hint">Prototipo · elige un rol y entra (cualquier credencial sirve)</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
  <aside>
    <div class="side-top">
      <div class="side-brand">Rayo<span class="dot"></span></div>
      <div id="roleBadge" class="side-role"></div>
    </div>
    <nav class="menu" id="menu"></nav>
    <div class="side-bottom">
      <div class="who"><b id="whoName"></b><br><span id="whoSub"></span></div>
      <button class="btn-out" onclick="logout()">Cerrar sesión</button>
    </div>
  </aside>
  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script>
/* ============================================================
   ESTADO COMPARTIDO  (un solo "sistema" para ambas vistas)
============================================================ */
const DB = {
  client: { name:'Strap Colombia', nit:'901.234.567-1' },
  catalog: [
    { id:'P1', sku:'STR-CIN-NEG-M', name:'Cinturón cuero negro M', desc:'Cuero genuino, hebilla acero', ean:'7701234500011', rayo:'RY-0001', units:120, pos:'A-01' },
    { id:'P2', sku:'STR-CIN-CAF-L', name:'Cinturón cuero café L', desc:'Cuero genuino, hebilla bronce', ean:'7701234500028', rayo:'RY-0002', units:84, pos:'A-02' },
    { id:'P3', sku:'STR-BIL-NEG',   name:'Billetera negra', desc:'Cuero, 6 tarjetas', ean:'', rayo:'RY-0003', units:43, pos:'B-05' },
  ],
  integrations:[
    { name:'Shopify', status:'active' },
    { name:'WooCommerce', status:'off' },
    { name:'Tienda Nube', status:'off' },
  ],
  // pedidos: estados -> received | queue | picking | packed | dispatched
  orders:[
    { id:'#1042', channel:'Shopify', cust:'María Gómez', city:'Bogotá', date:'07 Jun', status:'queue',
      items:[{pid:'P1',qty:1},{pid:'P3',qty:1}], carrier:null, guide:null, operator:null },
    { id:'#1041', channel:'Shopify', cust:'Andrés Ruiz', city:'Medellín', date:'07 Jun', status:'queue',
      items:[{pid:'P2',qty:2}], carrier:null, guide:null, operator:null },
    { id:'#1039', channel:'WooCommerce', cust:'Laura Peña', city:'Cali', date:'06 Jun', status:'dispatched',
      items:[{pid:'P1',qty:1}], carrier:'Coordinadora', guide:'CO-88451', operator:'Carlos' },
    { id:'#1038', channel:'Shopify', cust:'Juan Torres', city:'Bogotá', date:'06 Jun', status:'dispatched',
      items:[{pid:'P3',qty:2}], carrier:'Interrapidísimo', guide:'IR-22107', operator:'Diana' },
  ],
  receipts:[
    { id:'R-204', date:'05 Jun', declared:[{pid:'P1',qty:50}], status:'done', operator:'Carlos', discrepancy:0 },
  ],
  operators:[
    { name:'Carlos', role:'Operario', active:true, task:'Picking #1042' },
    { name:'Diana', role:'Operario', active:true, task:'Disponible' },
  ],
};
const RATES = { monthly:210900, perOrder1:3037, perOrderAdd:902, storage:25500 };

let SESSION = { role:null };
let pickedRole = null;

/* ============================================================
   HELPERS
============================================================ */
const $ = s=>document.querySelector(s);
const money = n=>'$'+n.toLocaleString('es-CO');
const prod = pid=>DB.catalog.find(p=>p.id===pid);
function orderUnits(o){return o.items.reduce((s,i)=>s+i.qty,0);}
function statusChip(s){
  const map={received:['blue','Recibido'],queue:['amber','En cola'],picking:['amber','En picking'],
    packed:['blue','Empacado'],dispatched:['green','Despachado'],done:['green','Completado']};
  const [c,l]=map[s]||['gray',s];return `<span class="chip ${c}">${l}</span>`;
}
function toast(msg){const t=$('#toast');$('#toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function closeModal(){$('#modalRoot').innerHTML='';}

/* ============================================================
   LOGIN
============================================================ */
function pickRole(r){
  pickedRole=r;
  $('#pickAdmin').classList.toggle('sel',r==='admin');
  $('#pickClient').classList.toggle('sel',r==='client');
  $('#email').value = r==='admin' ? 'ops@rayo.co' : 'hola@strap.co';
}
function doLogin(){
  if(!pickedRole){toast('Elige un tipo de acceso');return;}
  SESSION.role=pickedRole;
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  buildShell();
}
function logout(){
  SESSION={role:null};pickedRole=null;
  $('#app').classList.add('hidden');
  $('#login').classList.remove('hidden');
  $('#pickAdmin').classList.remove('sel');$('#pickClient').classList.remove('sel');
}

/* ============================================================
   SHELL + MENU
============================================================ */
const MENUS={
  admin:[
    ['dash','Dashboard'],['clients','Clientes'],['receiving','Recepción'],
    ['orders','Procesamiento'],['dispatch','Despacho'],['operators','Operarios'],
    ['billing','Facturación'],['config','Configuración'],
  ],
  client:[
    ['dash','Dashboard'],['orders','Pedidos'],['catalog','Catálogo'],
    ['inventory','Inventario'],['integrations','Integraciones'],['billing','Facturación'],
  ],
};
function buildShell(){
  const isAdmin=SESSION.role==='admin';
  $('#roleBadge').className='side-role '+(isAdmin?'admin':'client');
  $('#roleBadge').textContent=isAdmin?'Admin Rayo':'Portal Cliente';
  $('#whoName').textContent=isAdmin?'Operaciones Rayo':DB.client.name;
  $('#whoSub').textContent=isAdmin?'ops@rayo.co':'hola@strap.co';
  const menu=$('#menu');menu.innerHTML='';
  MENUS[SESSION.role].forEach(([k,label],i)=>{
    const b=document.createElement('button');
    b.innerHTML=`<span class="ic">${ICON(k)}</span><span>${label}</span>`;
    b.onclick=()=>{[...menu.children].forEach(c=>c.classList.remove('active'));b.classList.add('active');render(k);};
    if(i===0)b.classList.add('active');
    menu.appendChild(b);
  });
  render('dash');
}
function ICON(k){
  const c='stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"';
  const I={
    dash:`<svg viewBox="0 0 24 24" ${c}><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>`,
    clients:`<svg viewBox="0 0 24 24" ${c}><circle cx="9" cy="7" r="3"/><path d="M3 21v-1a6 6 0 0 1 12 0v1"/><path d="M17 11a3 3 0 0 0 0-6"/></svg>`,
    receiving:`<svg viewBox="0 0 24 24" ${c}><path d="M3 8l9-5 9 5v8l-9 5-9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg>`,
    orders:`<svg viewBox="0 0 24 24" ${c}><path d="M5 4h14l-1 16H6z"/><path d="M9 8h6"/></svg>`,
    dispatch:`<svg viewBox="0 0 24 24" ${c}><rect x="1" y="6" width="13" height="11"/><path d="M14 9h4l3 3v5h-7z"/><circle cx="6" cy="18" r="1.8"/><circle cx="17" cy="18" r="1.8"/></svg>`,
    operators:`<svg viewBox="0 0 24 24" ${c}><circle cx="12" cy="8" r="3.2"/><path d="M5 21v-1a7 7 0 0 1 14 0v1"/></svg>`,
    billing:`<svg viewBox="0 0 24 24" ${c}><rect x="4" y="3" width="16" height="18" rx="1"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>`,
    config:`<svg viewBox="0 0 24 24" ${c}><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>`,
    catalog:`<svg viewBox="0 0 24 24" ${c}><rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 9h18M8 4v16"/></svg>`,
    inventory:`<svg viewBox="0 0 24 24" ${c}><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>`,
    integrations:`<svg viewBox="0 0 24 24" ${c}><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>`,
  };
  return I[k]||'';
}

/* ============================================================
   ROUTER
============================================================ */
function render(key){
  const v=$('#view');
  const fn=(SESSION.role==='admin'?ADMIN:CLIENT)[key];
  v.innerHTML = fn ? fn() : '<div class="empty">Módulo en construcción</div>';
  if(typeof AFTER[key]==='function') AFTER[key]();
}
const AFTER={};

function head(t,s){return `<div class="page-head"><h1>${t}</h1>${s?`<p>${s}</p>`:''}</div>`;}

/* ============================================================
   VISTAS — CLIENTE
============================================================ */
const CLIENT={
  dash(){
    const today=DB.orders.filter(o=>o.date==='07 Jun');

function opRows(){
  return DB.operators.map((o,i)=>`<tr><td><b>${o.name}</b></td><td>${o.role}</td><td>${o.active?'<span class="chip green">Activo</span>':'<span class="chip gray">Inactivo</span>'}</td><td>${o.task}</td>
    <td><button class="btn ghost sm" onclick="toggleOp(${i})">${o.active?'Desactivar':'Activar'}</button></td></tr>`).join('');
}
function actionFor(o){
  if(o.status==='queue')return `<button class="btn pri sm" onclick="modalProcess('${o.id}')">Procesar</button>`;
  if(o.status==='picking')return `<button class="btn pri sm" onclick="modalProcess('${o.id}')">Continuar</button>`;
  if(o.status==='packed')return `<button class="btn ghost sm" onclick="goto('dispatch')">→ Despacho</button>`;
  return '';
}
function goto(key){
  const items=MENUS[SESSION.role];const idx=items.findIndex(m=>m[0]===key);
  const btns=$('#menu').children;[...btns].forEach(b=>b.classList.remove('active'));
  if(btns[idx])btns[idx].classList.add('active');
  render(key);
}

    <div class="modal-h"><h3>Solicitar ingreso de mercancía</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--ink-soft);margin-bottom:16px">Declara qué producto y cuántas unidades vas a enviar a la bodega. El Admin lo verá en su módulo de Recepción.</p>
      <div class="field"><label>Producto</label><select id="ri_prod">${DB.catalog.map(p=>`<option value="${p.id}">${p.sku} — ${p.name}</option>`).join('')}</select></div>
      <div class="field"><label>Unidades a enviar</label><input id="ri_qty" type="number" value="50"></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn pri" onclick="saveIngress()">Crear solicitud</button></div>
  </div></div>`;
}
function saveIngress(){
  const pid=$('#ri_prod').value,qty=+$('#ri_qty').value||0;
  const id='R-'+Math.floor(Math.random()*900+205);
  DB.receipts.push({id,date:'07 Jun',declared:[{pid,qty}],status:'pending',operator:null,discrepancy:0});
  closeModal();toast(`Ingreso ${id} solicitado · visible para Admin Rayo`);
}

/* ----- Admin: recibir con escaneo ----- */
function modalReceive(rid){
  const r=DB.receipts.find(x=>x.id===rid);const total=r.declared.reduce((s,d)=>s+d.qty,0);
  let scanned=0;
  const draw=()=>{$('#modalRoot').innerHTML=`<div class="modal-bg"><div class="modal">
    <div class="modal-h"><h3>Recepción ${rid}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="scan-progress">Escaneadas: ${scanned} / ${total} unidades</div>
      <div class="scanbox"><div style="font-size:12px;opacity:.6;letter-spacing:.1em">ESCANEANDO</div><div class="laser"></div>
        <div class="sku">${prod(r.declared[0].pid).rayo}</div><div class="sdesc">${prod(r.declared[0].pid).name}</div></div>
      <button class="btn pri" style="width:100%" onclick="window._scan()">📷 Pistolear unidad</button>
      <button class="btn ghost" style="width:100%;margin-top:8px" onclick="window._scanAll()">Escanear todas (demo rápida)</button>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn pri" ${scanned===0?'disabled':''} onclick="window._finishRecv()">Finalizar (${scanned} und)</button>
    </div></div></div>`;};
  window._scan=()=>{if(scanned<total){scanned++;draw();}};
  window._scanAll=()=>{scanned=total;draw();};
  window._finishRecv=()=>{
    const pid=r.declared[0].pid;prod(pid).units+=scanned;
    r.status='done';r.operator='Carlos';r.discrepancy=total-scanned;r.date='07 Jun';
    if(prod(pid).pos==='—')prod(pid).pos='C-0'+(DB.catalog.length);
    closeModal();render('receiving');
    toast(r.discrepancy===0?`Ingreso ${rid} completo · inventario actualizado`:`Ingreso ${rid} con discrepancia de ${r.discrepancy} und`);
  };
  draw();
}

/* ----- Admin: procesar orden (picking + packing con escaneo) ----- */
function modalProcess(oid){
  const o=DB.orders.find(x=>x.id===oid);
  if(o.status==='queue'){o.status='picking';o.operator='Carlos';DB.operators[0].task='Picking '+oid;}
  let picked=o.items.map(()=>false);
  const draw=()=>{
    const allDone=picked.every(Boolean);
    $('#modalRoot').innerHTML=`<div class="modal-bg"><div class="modal">
      <div class="modal-h"><h3>Procesar ${oid}</h3><button class="x" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="flow-banner" style="margin-bottom:16px">▸ <b>Picking:</b> pistolea cada producto en su posición. Luego <b>packing</b> valida antes de cerrar.</div>
        ${o.items.map((it,i)=>{const p=prod(it.pid);return `<div class="pick-item ${picked[i]?'done':''}">
          <div class="pos">${p.pos}</div>
          <div class="pname"><b>${p.name}</b><small>${p.rayo} · ${it.qty} und · SKU ${p.sku}</small></div>
          ${picked[i]?'<div class="check">✓</div>':`<button class="btn pri sm" onclick="window._pick(${i})">Pistolear</button>`}
        </div>`}).join('')}
      </div>
      <div class="modal-foot">
        <button class="btn ghost" onclick="closeModal()">Pausar</button>
        <button class="btn pri" ${allDone?'':'disabled'} onclick="window._pack()">✓ Confirmar packing</button>
      </div></div></div>`;
  };
  window._pick=i=>{picked[i]=true;draw();};
  window._pack=()=>{
    o.status='packed';
    o.items.forEach(it=>{prod(it.pid).units=Math.max(0,prod(it.pid).units-it.qty);});
    DB.operators[0].task='Disponible';
    closeModal();render('orders');
    toast(`${oid} empacado · listo para despacho`);
  };
  render('orders');draw();
}

/* ----- Admin: despachar (generar guía) ----- */
function modalDispatch(oid){
  const o=DB.orders.find(x=>x.id===oid);
  $('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-h"><h3>Generar guía · ${oid}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Cliente final</label><input value="${o.cust} — ${o.city}" disabled></div>
      <div class="field"><label>Transportadora</label><select id="dp_carrier">
        <option>Coordinadora</option><option>Interrapidísimo</option><option>Deprisa</option></select></div>
      <div class="hint-row">El escaneo final de despacho cierra la orden y notifica al cliente en su portal.</div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn pri" onclick="window._genGuide('${oid}')">Generar y despachar</button></div>
  </div></div>`;
  window._genGuide=(id)=>{
    const ord=DB.orders.find(x=>x.id===id);
    ord.carrier=$('#dp_carrier').value;
    const pfx={'Coordinadora':'CO','Interrapidísimo':'IR','Deprisa':'DP'}[ord.carrier];
    ord.guide=pfx+'-'+Math.floor(Math.random()*90000+10000);
    ord.status='dispatched';ord.operator=ord.operator||'Carlos';
    closeModal();render('dispatch');
    toast(`Guía ${ord.guide} generada · ${id} despachado`);
  };
}

/* ----- Admin: agregar operario ----- */
function modalAddOperator(){
  $('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-h"><h3>Agregar operario</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre</label><input id="op_name" placeholder="Nombre del operario"></div>
      <div class="field"><label>Rol</label><select id="op_role"><option>Operario</option><option>Supervisor</option></select></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn pri" onclick="saveOperator()">Agregar</button></div>
  </div></div>`;
}
function saveOperator(){
  const name=$('#op_name').value.trim()||'Nuevo operario';
  DB.operators.push({name,role:$('#op_role').value,active:true,task:'Disponible'});
  closeModal();render('operators');toast(`${name} agregado al equipo`);
}
</script>
</body>
</html>
